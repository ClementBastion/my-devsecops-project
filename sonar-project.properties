# ══════════════════════════════════════════════
# Configuration SonarQube — MYFTPDR
# Ce fichier est lu automatiquement par
# sonar-scanner lors du job CI/CD
# ══════════════════════════════════════════════

sonar.projectKey=myftpdr
sonar.projectName=MYFTPDR DevSecOps
sonar.projectVersion=1.0

# Sources et tests
sonar.sources=lambda-a/src,lambda-b/src
sonar.tests=lambda-a/tests,lambda-b/tests

# Langage
sonar.language=python
sonar.python.version=3.12

# Couverture de code
sonar.python.coverage.reportPaths=lambda-a/coverage.xml,lambda-b/coverage.xml

# Résultats tests
sonar.python.xunit.reportPath=lambda-a/junit.xml,lambda-b/junit.xml

# Exclusions (ne pas analyser)
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/tests/**,\
  **/.venv/**,\
  terraform/**

# Quality Gate — seuils bloquants
# (à configurer dans l'interface SonarQube)
# Couverture minimale : 80%
# Duplication maximale : 3%
# Nouvelles vulnérabilités : 0
# Nouveaux bugs : 0
