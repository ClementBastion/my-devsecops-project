name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-3
  PROJECT_NAME: myftpdr
  ENVIRONMENT: dev

jobs:

  # ─── 1. Tests unitaires (Lambda A et B en parallèle) ──────────────────
  test:
    name: Tests — ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lambda: [lambda-a, lambda-b]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ${{ matrix.lambda }}/requirements.txt pytest

      - name: Run unit tests
        run: pytest ${{ matrix.lambda }}/test_handler.py -v

  # ─── 2. Terraform plan (PR) ou apply (main) ───────────────────────────
  terraform:
    name: Terraform ${{ github.ref == 'refs/heads/main' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var="alert_email=${{ secrets.ALERT_EMAIL }}"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var="alert_email=${{ secrets.ALERT_EMAIL }}"

  # ─── 3. Build Docker + push ECR (Lambda A et B en parallèle) ─────────
  build-push:
    name: Build & Push — ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        lambda: [lambda-a, lambda-b]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$REGISTRY/${{ env.PROJECT_NAME }}/${{ matrix.lambda }}:${{ github.sha }}
          docker build -t $IMAGE_URI ${{ matrix.lambda }}/
          docker push $IMAGE_URI
          docker tag $IMAGE_URI $REGISTRY/${{ env.PROJECT_NAME }}/${{ matrix.lambda }}:latest
          docker push $REGISTRY/${{ env.PROJECT_NAME }}/${{ matrix.lambda }}:latest

  # ─── 4. Mise à jour des fonctions Lambda ──────────────────────────────
  deploy:
    name: Deploy Lambdas
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update Lambda A
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.PROJECT_NAME }}-lambda-a-${{ env.ENVIRONMENT }} \
            --image-uri ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}/lambda-a:${{ github.sha }}
          aws lambda wait function-updated \
            --function-name ${{ env.PROJECT_NAME }}-lambda-a-${{ env.ENVIRONMENT }}

      - name: Update Lambda B
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.PROJECT_NAME }}-lambda-b-${{ env.ENVIRONMENT }} \
            --image-uri ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}/lambda-b:${{ github.sha }}
          aws lambda wait function-updated \
            --function-name ${{ env.PROJECT_NAME }}-lambda-b-${{ env.ENVIRONMENT }}
